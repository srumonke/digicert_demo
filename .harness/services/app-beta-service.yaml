service:
  name: app-beta-service
  identifier: app-beta-service
  tags: {}
  serviceDefinition:
    spec:
      manifests:
        - manifest:
            identifier: k8s-manifests
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: github_connector
                  gitFetchType: Branch
                  paths:
                    - manifests/app-beta
                  repoName: digicert_demo
                  branch: main
              skipResourceVersioning: false
              enableDeclarativeRollback: false
      artifacts:
        primary:
          primaryArtifactRef: <+input>
          sources:
            - spec:
                connectorRef: dockerhub_connector
                imagePath: <+input>
                tag: <+pipeline.variables.tag>
              identifier: app_beta_image
              type: DockerRegistry
    type: Kubernetes
