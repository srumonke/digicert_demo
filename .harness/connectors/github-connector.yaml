connector:
  name: GitHub Connector
  identifier: github_connector
  description: GitHub connector for Git Experience
  orgIdentifier: default
  projectIdentifier: Digicert
  type: Github
  spec:
    url: https://github.com/<YOUR_ORG>/digicert_demo
    validationRepo: digicert_demo
    authentication:
      type: Http
      spec:
        type: UsernameToken
        spec:
          username: <YOUR_GITHUB_USERNAME>
          tokenRef: github_token
    apiAccess:
      type: Token
      spec:
        tokenRef: github_token
    delegateSelectors:
      - <YOUR_DELEGATE_SELECTOR>
    executeOnDelegate: true
    type: Repo
