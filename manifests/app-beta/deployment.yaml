apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-beta
  labels:
    app: app-beta
    harness.io/track: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-beta
  template:
    metadata:
      labels:
        app: app-beta
        harness.io/track: stable
    spec:
      containers:
        - name: app-beta
          image: <+artifact.image>
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
